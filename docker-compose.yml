version: '3.8'

services:
  web:
    build: .
    container_name: smartcam_web
    restart: always
    expose:
      - "5000"
    environment:
      - FLASK_ENV=production
      - SECRET_KEY=smartcam-industrial-secret
    volumes:
      - ./data:/app/data
      - ./app/static/uploads:/app/app/static/uploads
      - ./logs:/app/logs
    depends_on:
      - redis

  redis:
    image: redis:alpine
    container_name: smartcam_redis
    restart: always
    expose:
      - "6379"

  nginx:
    image: nginx:alpine
    container_name: smartcam_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web
