<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <title>Admin Panel - SmartCam AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>body { background-color: #0b1326; color: #dae2fd; }</style>
</head>
<body class="min-h-screen p-8 font-sans">
    <div class="max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-bold text-emerald-400">Admin Panel</h1>
            <a href="/admin/logout" class="text-red-400 hover:text-red-300 font-medium">Logout</a>
        </div>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="bg-slate-800/50 p-6 rounded-xl border border-white/10">
                <h2 class="text-xl font-semibold mb-4 text-white">Model Management</h2>
                <div class="space-y-4">
                    <button class="w-full bg-slate-700 hover:bg-slate-600 text-white px-4 py-2 rounded text-left flex justify-between">Upload New Model <span>&uarr;</span></button>
                    <button class="w-full bg-slate-700 hover:bg-slate-600 text-white px-4 py-2 rounded text-left flex justify-between">View Training Summary <span>&rarr;</span></button>
                </div>
            </div>
            
            <div class="bg-slate-800/50 p-6 rounded-xl border border-white/10">
                <h2 class="text-xl font-semibold mb-4 text-white">System Data</h2>
                <div class="space-y-4">
                    <button class="w-full bg-slate-700 hover:bg-slate-600 text-white px-4 py-2 rounded text-left flex justify-between">View System Logs <span>&equiv;</span></button>
                    <a href="/api/report/pdf" target="_blank" class="block w-full bg-slate-700 hover:bg-slate-600 text-white px-4 py-2 rounded text-left flex justify-between">Download Batch Report (PDF) <span>&darr;</span></a>
                    <button onclick="confirm('Are you sure you want to clear the database?')" class="w-full bg-red-900/50 hover:bg-red-800/50 text-red-200 border border-red-500/50 px-4 py-2 rounded text-left flex justify-between">Clear Database <span>&times;</span></button>
                </div>
            </div>
        </div>
        
        <div class="mt-8">
            <a href="/" class="text-emerald-400 hover:underline">&larr; Back to Dashboard</a>
        </div>
    </div>
</body>
</html>
