<!-- TopAppBar (Shared Component) -->
<header class="bg-surface/80 backdrop-blur-xl border-b border-white/5 shadow-md flex justify-between items-center w-full px-md h-xl sticky top-0 z-40">
<div class="flex items-center flex-1">
    <div class="flex items-center gap-2 md:hidden mr-md">
        <img src="{{ url_for('static', filename='images/avatar.png') }}" alt="QualiVision Logo" class="h-6 w-6 rounded object-cover">
        <h2 class="font-headline-md text-headline-md font-black text-on-surface">QualiVision</h2>
    </div>
<!-- Global Search -->
<form action="{{ url_for('history.index') }}" method="GET" class="hidden md:flex items-center bg-surface-container-highest/50 border border-white/10 rounded-full px-4 py-1.5 focus-within:border-primary focus-within:glow-primary transition-all w-64 max-w-sm">
<span class="material-symbols-outlined text-outline-variant mr-2 text-sm">search</span>
<input name="q" value="{{ q if q is defined else '' }}" class="bg-transparent border-none text-label-sm font-label-sm text-on-surface focus:outline-none focus:ring-0 w-full placeholder:text-on-surface-variant" placeholder="Search telemetry..." type="text"/>
</form>
</div>
<!-- Trailing Actions -->
<div class="flex items-center gap-md">
<div class="hidden md:flex flex-col items-end mr-sm">
<span class="font-label-sm text-label-sm text-primary flex items-center gap-1">
<span class="w-1.5 h-1.5 rounded-full bg-primary animate-pulse"></span> <span id="topbar-factory-name">Factory</span> Online
                    </span>
<span id="topbar-clock" class="font-mono-data text-mono-data text-on-surface-variant text-xs opacity-70">Local Time</span>
</div>
<div class="flex items-center gap-sm">
<button id="theme-toggle-topbar" class="text-on-surface-variant hover:text-primary transition-all p-1 rounded-full hover:bg-surface-variant/50">
<span class="material-symbols-outlined theme-icon-dark">light_mode</span>
</button>
<button class="text-on-surface-variant hover:text-primary transition-all p-1 rounded-full hover:bg-surface-variant/50">
<span class="material-symbols-outlined">notifications</span>
</button>
<button class="text-on-surface-variant hover:text-primary transition-all p-1 rounded-full hover:bg-surface-variant/50">
<img alt="User profile" class="w-8 h-8 rounded-full border border-white/10 object-cover" src="{{ url_for('static', filename='images/avatar.png') }}"/>
</button>
</div>
</div>
</header>
