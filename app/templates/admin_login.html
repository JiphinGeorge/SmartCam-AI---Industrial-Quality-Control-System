<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <title>Admin Login - SmartCam AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>body { background-color: #0b1326; color: #dae2fd; }</style>
</head>
<body class="min-h-screen flex items-center justify-center font-sans">
    <div class="bg-slate-800/50 p-8 rounded-xl border border-white/10 shadow-2xl w-full max-w-md">
        <h1 class="text-2xl font-bold text-emerald-400 mb-6 text-center">Admin Portal</h1>
        
        {% if error %}
        <div class="bg-red-500/20 border border-red-500 text-red-400 px-4 py-2 rounded mb-6 text-sm text-center">
            {{ error }}
        </div>
        {% endif %}
        
        <form method="POST" action="/admin" class="space-y-6">
            <div>
                <label class="block text-sm font-medium text-slate-300 mb-2">Password (Hint: admin123)</label>
                <input type="password" name="password" required class="w-full bg-slate-900 border border-slate-700 rounded px-4 py-2 text-white focus:outline-none focus:border-emerald-500">
            </div>
            <button type="submit" class="w-full bg-emerald-500 text-slate-900 px-6 py-2 rounded font-semibold hover:bg-emerald-400 transition-colors">Login</button>
        </form>
        
        <div class="mt-6 text-center">
            <a href="/" class="text-slate-400 hover:text-white text-sm">&larr; Return to Dashboard</a>
        </div>
    </div>
</body>
</html>
